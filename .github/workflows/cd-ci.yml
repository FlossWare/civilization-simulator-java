name: CD-CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.pusher.email != 'version-bump@flossware.org'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Updating runner
        run: sudo apt-get update

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Maven settings for PackageCloud
        uses: s4u/maven-settings-action@v3.1.0
        with:
          githubServer: false
          servers: |
            [
              {
                "id": "packagecloud-flossware",
                "configuration": {
                  "httpHeaders": {
                    "property": {
                      "name": "Authorization",
                      "value": "Bearer ${{ secrets.PACKAGECLOUD_TOKEN }}"
                    }
                  }
                }
              }
            ]

      - name: Setup .gitconfig for version bumps
        uses: oleksiyrudenko/gha-git-credentials@latest
        with:
          global: true
          name: 'Version Bump'
          email: 'version-bump@flossware.org'
          actor: 'VersionBump'
          token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Incrementing pom.xml version
        run: "mvn -U build-helper:parse-version versions:set -DnewVersion=\\${parsedVersion.majorVersion}.\\${parsedVersion.nextMinorVersion} versions:commit"

      - name: Ensure latest dependencies in pom.xml
        run: "mvn -Dincludes='org.junit.jupiter:*' -DgenerateBackupPoms=false versions:update-properties"

      - name: Building and Testing
        run: "mvn -U clean install"

      - name: Verify build success
        run: |
          JAR_FILE="target/$(mvn help:evaluate -Dexpression=project.build.finalName -q -DforceStdout).jar"
          if [ ! -f "$JAR_FILE" ]; then
            echo "Build failed - expected JAR not found: $JAR_FILE"
            echo "Contents of target directory:"
            ls -la target/*.jar 2>/dev/null || echo "No JAR files in target directory"
            exit 1
          fi
          echo "Build succeeded - deploying to packagecloud.io"

      - name: Deploy to packagecloud.io
        run: |
          set -o pipefail
          mvn -DskipTests deploy 2>&1 | tee deploy.log || true
          DEPLOY_EXIT_CODE=${PIPESTATUS[0]}

          if [ "$DEPLOY_EXIT_CODE" -eq 0 ]; then
            echo "Deployment succeeded."
            exit 0
          fi

          # Known issue #1: PackageCloud rejects POM uploads with HTTP 422
          # but JAR uploads succeed. Only tolerate this specific failure.
          if grep -qE "(422.*Unprocessable Entity|Failed to deploy artifacts.*\.pom|PUT.*\.pom.*422)" deploy.log; then
            # Verify the failure is limited to POM files only
            NON_POM_FAILURES=$(grep -c "Failed to deploy artifacts" deploy.log | head -1)
            POM_FAILURES=$(grep "Failed to deploy artifacts" deploy.log | grep -c "\.pom" || true)
            if [ "$NON_POM_FAILURES" -eq "$POM_FAILURES" ] 2>/dev/null; then
              echo "::warning::POM upload rejected by PackageCloud (known issue #1). JAR deployment succeeded."
              exit 0
            fi
          fi

          # Any other failure is a real deployment problem that must block tagging.
          echo "::error::Deployment failed with exit code $DEPLOY_EXIT_CODE. Review the log output above."
          exit 1

      - name: Checkin and tag to github
        run: "mvn scm:checkin scm:tag"
