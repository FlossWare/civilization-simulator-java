name: Build Android APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
    
    - name: Grant execute permission for gradlew
      run: chmod +x mobile/gradlew
      working-directory: .

    - name: Build with Gradle
      run: ./gradlew :androidApp:assembleRelease --no-daemon
      working-directory: mobile
    
    - name: Sign APK (if release)
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        echo "APK signing would happen here with release keys"
        # In production, use GitHub secrets for signing keys
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: mobile/androidApp/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: mobile/androidApp/build/outputs/apk/release/*.apk
        body: |
          ## Android APK
          
          **Installation Instructions**:
          1. Download the APK file
          2. Enable "Install from Unknown Sources" on your Android device
          3. Transfer APK to device and install
          4. Grant necessary permissions
          
          **Requirements**:
          - Android 8.0 (API 26) or higher
          - ~20MB storage space
          
          **Features**:
          - Full civilization simulation engine
          - Monte Carlo analysis (parallel runs)
          - Reproducible results with seeded RNG
          - Native Android UI with Jetpack Compose
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
