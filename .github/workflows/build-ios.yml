name: Build iOS IPA

on:
  push:
    branches: [ main ]
    paths:
      # NOTE: Update this path if MOBILE_DIR changes
      - 'mobile/**'
      - '.github/workflows/build-ios.yml'
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
    paths:
      # NOTE: Update this path if MOBILE_DIR changes
      - 'mobile/**'
      - '.github/workflows/build-ios.yml'
  workflow_dispatch:

env:
  MOBILE_DIR: mobile

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: Grant execute permission for gradlew
      run: chmod +x ${{ env.MOBILE_DIR }}/gradlew

    - name: Build shared framework
      run: ./gradlew :shared:linkReleaseFrameworkIosArm64 --no-daemon
      working-directory: ${{ env.MOBILE_DIR }}

    - name: Build iOS app with Xcode
      run: |
        cd ${{ env.MOBILE_DIR }}/iosApp
        xcodebuild clean archive \
          -scheme iosApp \
          -configuration Release \
          -archivePath build/iosApp.xcarchive \
          -sdk iphoneos \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    - name: Create export options
      run: |
        cd ${{ env.MOBILE_DIR }}/iosApp
        cat > ExportOptions.plist << PLIST
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>development</string>
          <key>compileBitcode</key>
          <false/>
        </dict>
        </plist>
        PLIST

    - name: Export IPA
      id: export_ipa
      continue-on-error: true
      run: |
        cd ${{ env.MOBILE_DIR }}/iosApp
        xcodebuild -exportArchive \
          -archivePath build/iosApp.xcarchive \
          -exportPath build \
          -exportOptionsPlist ExportOptions.plist

    - name: Handle export failure
      if: steps.export_ipa.outcome == 'failure'
      run: |
        cd ${{ env.MOBILE_DIR }}/iosApp
        echo "IPA export failed"

        # Check if archive exists (indicates build succeeded, export failed)
        if [ -f build/iosApp.xcarchive/Info.plist ]; then
          echo "::warning::IPA export failed - likely due to code signing requirements"
          echo "iOS build completed. Signing required for distribution." > build/BUILD_INFO.txt
        else
          echo "::error::Archive missing - build may have failed"
          exit 1
        fi

    - name: Verify export success
      if: steps.export_ipa.outcome == 'success'
      run: |
        cd ${{ env.MOBILE_DIR }}/iosApp
        if [ ! -f build/iosApp.ipa ]; then
          echo "::error::Export reported success but IPA file missing"
          exit 1
        fi
        echo "IPA export successful"
    
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa
        path: |
          ${{ env.MOBILE_DIR }}/iosApp/build/*.ipa
          ${{ env.MOBILE_DIR }}/iosApp/build/BUILD_INFO.txt
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ env.MOBILE_DIR }}/iosApp/build/*.ipa
          ${{ env.MOBILE_DIR }}/iosApp/build/BUILD_INFO.txt
        body: |
          ## iOS IPA
          
          **Note**: This IPA is unsigned and for development purposes only.
          
          **Installation Instructions**:
          
          **Option 1: AltStore (Recommended)**
          1. Install AltStore on your iOS device
          2. Download the IPA file
          3. Open in AltStore to sideload
          
          **Option 2: Xcode**
          1. Clone the repository
          2. Open `mobile/iosApp/iosApp.xcodeproj` in Xcode
          3. Select your device
          4. Build and run directly
          
          **Requirements**:
          - iOS 14.0 or higher
          - ~30MB storage space
          - Development certificate (for sideloading)
          
          **Features**:
          - Full civilization simulation engine
          - Monte Carlo analysis (parallel runs)
          - Reproducible results with seeded RNG
          - Native iOS UI with SwiftUI
          
          **Note**: For App Store distribution, proper code signing is required.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
